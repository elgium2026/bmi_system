<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Input Form</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="min-height:100vh;">

<div class="card shadow p-4" style="max-width: 500px; width:100%;">

    <h3 class="text-center mb-4">BMI Input Form</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success text-center">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Sex</label>
            <select name="sex" class="form-control">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Weight (kg)</label>
            <input type="number" step="0.1" name="weight" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Height (cm)</label>
            <input type="number" step="0.1" name="height" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Waist (cm)</label>
            <input type="number" step="0.1" name="waist" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Hip (cm)</label>
            <input type="number" step="0.1" name="hip" class="form-control">
        </div>

        <div class="mb-4">
            <label class="form-label">Wrist (cm)</label>
            <input type="number" step="0.1" name="wrist" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Compute BMI
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'logout' %}" class="text-decoration-none">
            Logout
        </a>
    </div>

</div>

</body>
</html>
