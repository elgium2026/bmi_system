<!DOCTYPE html>
<html>
<head>
    <title>BMI System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
        }
        a {
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
